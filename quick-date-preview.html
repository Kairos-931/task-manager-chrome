<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快捷日期选择 - 样稿</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #f1f5f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }
  .mockup {
    width: 480px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 24px 16px;
    border-bottom: 1px solid #f1f5f9;
  }
  .modal-header h2 { font-size: 18px; font-weight: 600; }
  .modal-body { padding: 20px 24px; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #374151; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 12px;
    border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 14px; background: white; outline: none;
  }
  .field input:focus, .field select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

  .input-row { display: flex; gap: 12px; }
  .input-row .field { flex: 1; }

  /* ===== 快捷日期栏 ===== */
  .quick-dates {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .quick-date-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 4px;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .quick-date-btn:hover {
    border-color: #c7d2fe;
    background: #f5f3ff;
  }
  .quick-date-btn .day-name {
    font-size: 10px;
    color: #9ca3af;
    font-weight: 500;
  }
  .quick-date-btn .day-num {
    font-size: 16px;
    font-weight: 600;
    color: #374151;
  }
  .quick-date-btn .day-badge {
    font-size: 8px;
    padding: 1px 5px;
    border-radius: 4px;
    background: transparent;
    color: transparent;
  }

  /* 今天 */
  .quick-date-btn.today {
    border-color: #6366f1;
    background: #eef2ff;
  }
  .quick-date-btn.today .day-name { color: #6366f1; }
  .quick-date-btn.today .day-num { color: #6366f1; }
  .quick-date-btn.today .day-badge {
    background: #6366f1;
    color: white;
  }

  /* 选中状态 */
  .quick-date-btn.selected {
    border-color: #6366f1;
    background: #6366f1;
  }
  .quick-date-btn.selected .day-name { color: rgba(255,255,255,0.75); }
  .quick-date-btn.selected .day-num { color: white; }
  .quick-date-btn.selected .day-badge {
    background: rgba(255,255,255,0.25);
    color: white;
  }

  .note {
    margin: 0 24px 20px;
    padding: 10px 14px;
    background: #fef9c3;
    border-radius: 8px;
    font-size: 12px;
    color: #a16207;
    line-height: 1.5;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: #9ca3af;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .form-actions {
    display: flex; gap: 12px; justify-content: flex-end;
    padding: 16px 24px 20px;
    border-top: 1px solid #f1f5f9;
  }
  .form-actions button {
    padding: 10px 20px; border-radius: 8px;
    border: none; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .btn-cancel { background: #f3f4f6; color: #374151; }
  .btn-add { background: #6366f1; color: white; }
</style>
</head>
<body>
<div class="mockup">
  <div class="modal-header">
    <h2>添加任务</h2>
    <button style="border:none;background:none;cursor:pointer;color:#9ca3af;font-size:18px;">✕</button>
  </div>
  <div class="note">⚡ 新功能样稿：本周日期快捷选择，选中后自动填入下方日期。</div>
  <div class="modal-body">
    <!-- 任务名称 -->
    <div class="field">
      <label>任务名称 *</label>
      <input type="text" placeholder="输入任务名称" value="整理季度报告">
    </div>

    <!-- 备注 -->
    <div class="field">
      <label>备注</label>
      <textarea rows="2" style="resize:none;" placeholder="可选"></textarea>
    </div>

    <!-- 优先级 + 分类 -->
    <div class="input-row">
      <div class="field">
        <label>优先级</label>
        <select><option>高</option><option selected>中</option><option>低</option></select>
      </div>
      <div class="field">
        <label>分类</label>
        <select><option>工作</option><option>生活</option><option>学习</option></select>
      </div>
    </div>

    <!-- 截止日期区域：快捷选择 + 日期输入 -->
    <div class="field">
      <label>截止日期</label>
      <div class="section-label">本周快捷选择</div>
      <div class="quick-dates">
        <button class="quick-date-btn">
          <span class="day-name">周一</span>
          <span class="day-num">7</span>
          <span class="day-badge"></span>
        </button>
        <button class="quick-date-btn">
          <span class="day-name">周二</span>
          <span class="day-num">8</span>
          <span class="day-badge"></span>
        </button>
        <button class="quick-date-btn">
          <span class="day-name">周三</span>
          <span class="day-num">9</span>
          <span class="day-badge"></span>
        </button>
        <button class="quick-date-btn">
          <span class="day-name">周四</span>
          <span class="day-num">10</span>
          <span class="day-badge">今天</span>
        </button>
        <button class="quick-date-btn">
          <span class="day-name">周五</span>
          <span class="day-num">11</span>
          <span class="day-badge"></span>
        </button>
        <button class="quick-date-btn">
          <span class="day-name">周六</span>
          <span class="day-num">12</span>
          <span class="day-badge"></span>
        </button>
        <button class="quick-date-btn">
          <span class="day-name">周日</span>
          <span class="day-num">13</span>
          <span class="day-badge"></span>
        </button>
      </div>
      <input type="date" value="2026-07-10">
    </div>

    <!-- 无时间限制 -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
      <input type="checkbox" id="noTime">
      <label for="noTime" style="font-size:13px;color:#6b7280;">无时间限制（任务池）</label>
    </div>

    <!-- 时长 + 重复 -->
    <div class="input-row">
      <div class="field">
        <label>预计时长 (小时)</label>
        <div style="display:flex;align-items:center;gap:8px;">
          <button style="width:36px;height:36px;border:1px solid #d1d5db;border-radius:8px;background:white;cursor:pointer;font-size:16px;">−</button>
          <input type="number" value="1.0" style="width:60px;text-align:center;padding:8px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;">
          <button style="width:36px;height:36px;border:1px solid #d1d5db;border-radius:8px;background:white;cursor:pointer;font-size:16px;">+</button>
        </div>
      </div>
      <div class="field">
        <label>重复</label>
        <select><option>不重复</option><option>每天</option><option>每周几</option><option>每月</option><option>工作日</option><option>自定义间隔</option></select>
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button class="btn-cancel">取消</button>
    <button class="btn-add">添加</button>
  </div>
</div>
<script>
  // 交互演示：点击快捷按钮高亮
  document.querySelectorAll('.quick-date-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.quick-date-btn').forEach(b => b.classList.remove('selected'));
      this.classList.add('selected');
    });
  });
</script>
</body>
</html>
